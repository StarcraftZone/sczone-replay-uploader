name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $csproj = Get-Content sczone-replay-uploader.csproj -Raw
          $match = [regex]::Match($csproj, '<Version>([^<]+)</Version>')
          if (-not $match.Success) { throw 'No <Version> found in csproj' }
          $base = $match.Groups[1].Value
          $parts = $base.Split('.')
          while ($parts.Count -lt 3) { $parts += '0' }
          $version = "{0}.{1}.{2}.{3}" -f $parts[0], $parts[1], $parts[2], ${env:GITHUB_RUN_NUMBER}
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Publish (self-contained, single file)
        run: >
          dotnet publish sczone-replay-uploader.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:Version=${{ steps.ver.outputs.version }}
          -p:AssemblyVersion=${{ steps.ver.outputs.version }}
          -p:FileVersion=${{ steps.ver.outputs.version }}
          -o publish

      - name: Rename exe with version
        shell: pwsh
        run: |
          $src = 'publish/sczone-replay-uploader.exe'
          $dst = "publish/sczone-replay-uploader-v${{ steps.ver.outputs.version }}-win-x64.exe"
          Rename-Item -Path $src -NewName (Split-Path $dst -Leaf)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sczone-replay-uploader-v${{ steps.ver.outputs.version }}
          path: publish/*.exe
          if-no-files-found: error

      - name: Generate release notes
        if: github.event_name == 'push'
        id: notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ steps.ver.outputs.version }}"
          $repoUrl = "https://github.com/${{ github.repository }}"
          $sha = "${{ github.sha }}"

          $prevTag = git tag --sort=-creatordate | Select-Object -First 1
          if ($prevTag) {
            $range = "$prevTag..$sha"
            $changelogLine = "**代码变更**: $repoUrl/compare/$prevTag...$tag"
          } else {
            $range = $sha
            $changelogLine = "**代码变更**: $repoUrl/commits/$tag"
          }

          $commits = git log $range --pretty=format:'* %s (%h)' --no-merges
          if (-not $commits) { $commits = '* (无提交)' }

          $note = "备注: 请点击下方 ↓ Assets 中的 exe 链接下载程序（无需安装可直接运行），即可实现游戏结束后自动上传录像文件。"
          $finalNotes = @('## 更新内容', $commits, '', $changelogLine, '', $note) -join "`n"

          $delim = "EOF_$([guid]::NewGuid().ToString('N'))"
          "notes<<$delim" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $finalNotes | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $delim | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          files: publish/*.exe
          body: ${{ steps.notes.outputs.notes }}
