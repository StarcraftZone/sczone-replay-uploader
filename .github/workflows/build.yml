name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $csproj = Get-Content sczone-replay-uploader.csproj -Raw
          $match = [regex]::Match($csproj, '<Version>([^<]+)</Version>')
          if (-not $match.Success) { throw 'No <Version> found in csproj' }
          $parts = $match.Groups[1].Value.Split('.')
          $version = "{0}.{1}.{2}" -f $parts[0], $parts[1], ${env:GITHUB_RUN_NUMBER}
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Publish (self-contained, single file)
        run: >
          dotnet publish sczone-replay-uploader.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:Version=${{ steps.ver.outputs.version }}
          -p:AssemblyVersion=${{ steps.ver.outputs.version }}
          -p:FileVersion=${{ steps.ver.outputs.version }}
          -o publish

      - name: Rename exe with version
        shell: pwsh
        run: |
          $src = 'publish/sczone-replay-uploader.exe'
          $dst = "publish/sczone-replay-uploader-v${{ steps.ver.outputs.version }}-win-x64.exe"
          Rename-Item -Path $src -NewName (Split-Path $dst -Leaf)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sczone-replay-uploader-v${{ steps.ver.outputs.version }}
          path: publish/*.exe
          if-no-files-found: error

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          files: publish/*.exe
          generate_release_notes: true
